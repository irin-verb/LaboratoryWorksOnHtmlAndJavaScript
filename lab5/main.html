<!doctype html>
<html>

<head>
	<meta charset="utf-8">
	<style>
		input {
			margin-top: 10px;
		}
		form, div {
			margin-top: 20px;
		}
		
		.message {
			margin: 15px;
			padding: 15px;
			border: 1px solid #d6e9c6;
			border-radius: 4px;
			color: #3c763d;
			background-color: #dff0d8;
		}
	</style>
	<script src="script.js"charset="windows-1251"></script>
</head>

<body onload="init()">
	<form>
		Размерность матрицы M1:
		<input type="text" id="size_m1" value="4,4"> <br>

		Размерность матрицы M2:
		<input type="text" id="size_m2" value="3,10"> <br>

		Диапазон случайной генерации:
		<input type="text" id="random_range" value="-10,10"> <br>

		<input type="button" id="button" value="Преобразовать" 
			   onclick="calculate(form.size_m1.value, form.size_m2.value, form.random_range.value)">
	</form>
</body>
</html>
